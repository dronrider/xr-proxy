# XR Proxy — Client Configuration
# Place this file at /etc/xr-proxy/config.toml on your OpenWRT router

# ─── Server connection ────────────────────────────────────────────────
# Legacy-вариант с одним сервером. Продолжает работать как пул из одного
# элемента; при заданных [[servers]] игнорируется.
[server]
address = "YOUR_SERVER_IP"            # IP address of your VPS
port = 8443                           # Must match server config

# ─── Пул серверов (multi-VPS failover, LLD-10) ────────────────────────
# Вместо одиночного [server] можно задать упорядоченный пул: активен сервер
# с наименьшим priority среди здоровых (0 = primary). При падении активного
# трафик за секунды переключается на следующий, после восстановления primary
# возвращается на него (failback c hold-down от флаппинга). Direct остаётся
# последним рубежом, когда недоступен весь пул.
#
# [[servers]]
# name = "aeza"                       # лейбл для логов
# address = "PRIMARY_SERVER_IP"
# port = 8443
# priority = 0                        # меньше = выше приоритет
#
# [[servers]]
# name = "timeweb"
# address = "BACKUP_SERVER_IP"
# port = 8443
# priority = 1
# # key = "..."                       # опционально: override общего
# # salt = 0xDEADBEEF                 # [obfuscation]-ключа, если у резерва
# # modifier = "positional_xor_rotate"# другой провайдер и другой ключ

# ─── Obfuscation (must match server exactly!) ─────────────────────────
[obfuscation]
key = "GENERATE_WITH_generate-key.sh" # Run: ./scripts/generate-key.sh
modifier = "positional_xor_rotate"    # Options: positional_xor_rotate, rotating_salt, substitution_table
salt = 0xDEADBEEF                     # Any 32-bit hex number, must match server
padding_min = 16                      # Min random padding per packet (bytes)
padding_max = 128                     # Max random padding per packet (bytes)

# ─── Routing rules ────────────────────────────────────────────────────
# default_action: what to do when no rule matches
#   "direct" = send directly (proxy only matched domains)
#   "proxy"  = proxy everything (bypass only matched domains)
[routing]
default_action = "direct"

# Rule 1: Proxy these domains through the server
[[routing.rules]]
action = "proxy"
domains = [
  # Google
  "youtube.com", "*.youtube.com", "*.googlevideo.com", "*.ggpht.com",
  "*.google.com", "*.gmail.com", "*.googleapis.com", "*.gstatic.com",
  # Telegram
  "telegram.org", "*.telegram.org", "*.t.me", "*.telegram.me",
  # WhatsApp
  "*.whatsapp.com", "*.whatsapp.net",
  # GitHub
  "github.com", "*.github.com", "*.githubusercontent.com", "*.githubassets.com",
  # Other
  "*.openai.com", "*.anthropic.com",
]

# Rule 2 (optional, requires --features geoip build):
# Proxy traffic to specific countries
# [[routing.rules]]
# action = "proxy"
# geoip = ["US", "NL", "DE"]

# ─── Client settings ─────────────────────────────────────────────────
[client]
listen_port = 1080                    # Local port for transparent proxy
auto_redirect = true                  # Auto-setup nftables/iptables rules
on_server_down = "direct"             # "direct" = bypass if server is down, "block" = block traffic
log_level = "info"                    # error, warn, info, debug
# bypass_ips: LAN devices whose traffic should NOT go through the proxy.
# Useful for game consoles, smart TVs, etc. Use their static DHCP IP.
# bypass_ips = ["192.168.1.50", "192.168.1.51"]
# mux_pool_size: number of parallel TCP tunnels to the server (default 4).
# Multiple tunnels eliminate head-of-line blocking — a packet loss on one
# TCP no longer stalls every other stream. Set to 2 on small networks,
# 4-8 on heavy multi-device traffic.
# mux_pool_size = 4
# block_quic: drop QUIC (UDP/443) from LAN so browsers fall back to TCP/443,
# which the proxy can intercept (default true). Without it any site that
# advertises HTTP/3 (alpn="h3" in DNS) goes out over UDP directly, bypassing
# the proxy — geo-blocked sites then fail even though TCP is proxied.
# block_quic = true

# ─── Hub (centralized presets from xr-hub) ───────────────────────────
# When configured, the client fetches routing presets from xr-hub on startup
# and refreshes them periodically. Local [[routing.rules]] above become
# overrides that take priority over the preset.
#
# Android-клиент (LLD-04) заполняет эти поля автоматически из инвайта
# (QR / deep link / вставленная ссылка) — ручное редактирование не нужно.
# OpenWRT-клиент пока заполняет вручную; onboarding через инвайт для
# router'а — предмет отдельного LLD.
# [hub]
# url = "https://xr-hub.example.com"
# preset = "russia"
# # trusted_public_key = "<base64 ed25519 public key>"  # optional, for signature verification
# # refresh_interval_secs = 300                          # background check interval (default 5 min)

# ─── GeoIP (only with --features geoip build) ────────────────────────
# [geoip]
# database = "/etc/xr-proxy/GeoLite2-Country.mmdb"

# ─── UDP Relay (for Nintendo Switch, game consoles) ─────────────────
# Relay UDP traffic through VPS for devices that need NAT traversal.
# Requires nftables TPROXY setup (see docs/OPENWRT.md).
# [udp_relay]
# enabled = true
# listen_port = 1081                  # Local TPROXY port
# vps_port = 9999                     # UDP relay port on VPS (must match server config)
# use_tproxy = true                   # Use TPROXY (recommended) vs REDIRECT
# source_ips = ["192.168.1.188"]       # REQUIRED: devices to relay (e.g. Switch IPs)
# # Assign static IPs via DHCP so these don't change!
# exclude_dst_ports = [53, 67, 68]    # Don't relay DNS, DHCP
# flow_timeout_sec = 120              # UDP flow expiry
# keepalive_interval_sec = 25         # Keepalive to VPS
