# xr-hub configuration example

[server]
bind = "0.0.0.0:8080"
data_dir = "/var/lib/xr-hub"

# [tls]
# cert = "/etc/xr-hub/tls/fullchain.pem"
# key  = "/etc/xr-hub/tls/privkey.pem"

# Generate password hash: xr-hub hash-password YOUR_PASSWORD
[[admin.users]]
username = "admin"
password_hash = "$argon2id$..."   # xr-hub hash-password <password>

# allowed_origins = ["https://xr-hub.example.com"]

# [signing]
# private_key = "/var/lib/xr-hub/signing_key"

[invites]
dev_mode = false
default_ttl_seconds = 86400      # 24h
max_ttl_seconds = 604800         # 7d

# Default values for invite payloads (so you don't type them every time).
[invites.defaults]
server_address = "YOUR_SERVER_IP"
server_port = 8443
obfuscation_key = "YOUR_BASE64_KEY"
modifier = "positional_xor_rotate"
salt = 0xDEADBEEF
hub_url = "https://xr-hub.example.com"

# Пул серверов в инвайте (LLD-10): приложение получает список и делает
# failover само. Legacy-поля server_address/server_port выше при заданном
# пуле игнорируются, payload заполняется primary'м из списка.
#
# [[invites.defaults.servers]]
# name = "aeza"
# address = "PRIMARY_SERVER_IP"
# port = 8443
# priority = 0                      # меньше = выше приоритет
#
# [[invites.defaults.servers]]
# name = "timeweb"
# address = "BACKUP_SERVER_IP"
# port = 8443
# priority = 1

# Relay для шар за NAT (LLD-23, XR-103). Хаб раздаёт этот дескриптор агентам
# (при exchange/share) и потребителям (в грантах на via_relay-шары), минтит
# relay-токены транзита. Без блока via_relay-шары работают только по прямому
# адресу, relay-fallback в грант не попадёт. Обфускация обязана совпадать с
# конфигом самого relay (configs/relay.toml).
#
# [relay]
# addr = "relay.example.com"        # адрес xr-relay (обычно тот же VPS)
# port = 8444
# [relay.obfuscation]
# key = "YOUR_BASE64_KEY"
# modifier = "positional_xor_rotate"
# salt = 0xDEADBEEF
# padding_min = 16
# padding_max = 128
